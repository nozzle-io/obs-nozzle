name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Get OBS headers and simde
        run: |
          git clone --depth 1 --filter=blob:none --sparse https://github.com/obsproject/obs-studio.git /tmp/obs-studio
          cd /tmp/obs-studio
          git sparse-checkout set libobs deps/simde

      - name: Create obsconfig.h
        run: printf '#pragma once\n' > /tmp/obs-studio/libobs/obsconfig.h

      - name: Configure
        run: cmake -B build -DOBS_INCLUDE_DIR=/tmp/obs-studio/libobs -DOBS_DEPS_INCLUDE_DIR=/tmp/obs-studio/deps/simde -DCMAKE_OSX_DEPLOYMENT_TARGET=12.0 -DNOZZLE_OBS_LINK_LIBRARY=OFF

      - name: Build
        run: cmake --build build

  build-windows:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Get OBS headers
        shell: bash
        run: |
          git clone --depth 1 --filter=blob:none --sparse https://github.com/obsproject/obs-studio.git "$RUNNER_TEMP/obs-studio"
          cd "$RUNNER_TEMP/obs-studio"
          git sparse-checkout set libobs

      - name: Create obsconfig.h
        shell: bash
        run: printf '#pragma once\n' > "$RUNNER_TEMP/obs-studio/libobs/obsconfig.h"

      - name: Configure
        shell: bash
        run: cmake -B build -DOBS_INCLUDE_DIR="$RUNNER_TEMP/obs-studio/libobs" -DNOZZLE_OBS_LINK_LIBRARY=OFF

      - name: Build
        shell: bash
        run: cmake --build build --config Debug
